<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a group on Splitlyn</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F7F7FA;
      color: #1C1C1E;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 15px; color: #555; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      background: #000;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You've been invited to split expenses</h1>
    <p>Someone invited you to join their group on Splitlyn. Get the app to accept the invite and start splitting bills together.</p>
    <!-- TODO: replace with your real App Store link once published -->
    <a class="badge" href="https://apps.apple.com/app/idYOUR_APP_ID">Get Splitlyn on the App Store</a>
  </div>
</body>
</html>
